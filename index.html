<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | QR code component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      body {
        font-family: "Outfit";
      }
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
      .flex-container {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .qr-background {
        width: 700px;
        height: 400px;
        background-color: hsl(212, 45%, 89%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 5px 10px 5px rgba(0, 0, 0, 0.15);
      }
      .qr-container {
        background-color: hsl(0, 0%, 100%);
        width: 200px;
        border-radius: 20px;
        padding: 8px;
      }
      .qr-image {
        width: 200px;
        height: 200px;
        object-fit: cover;
        border-radius: 10px;
      }
      .qr-container h1 {
        font-size: 15px;
        color: hsl(218, 44%, 22%);
        text-align: center;
      }
      .qr-container p {
        font-size: 12px;
        color: hsl(216, 15%, 48%);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- 
      Improve your front-end skills by building projects Scan the QR code to visit
      Frontend Mentor and take your coding skills to the next level
    -->
    <main>
      <div class="flex-container">
        <div class="qr-background">
          <div class="qr-container">
            <img
              class="qr-image"
              src="images/image-qr-code.png"
              alt="Visit frontend mentor"
            />
            <h1>Improve your front-end skills by building projects</h1>
            <p>
              Scan the QR code to visit Frontend Mentor and take your coding
              skills to the next level
            </p>
          </div>
        </div>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Silentheartz</a>.
    </footer>
  </body>
</html>
